<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      <![CDATA[
        @keyframes blink {
          0%, 45% { opacity: 1; }
          50%, 100% { opacity: 0; }
        }
        @keyframes glowPulse {
          0%, 100% { filter: drop-shadow(0 0 2px #58A6FF88); }
          50%       { filter: drop-shadow(0 0 9px #58A6FFcc); }
        }
        @keyframes dotPulse {
          0%, 100% { opacity: 1; }
          50%      { opacity: 0.35; }
        }
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(8px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes borderGlow {
          0%, 100% { stroke: #30363D; }
          50%      { stroke: #58A6FF55; }
        }

        .terminal-border { animation: borderGlow 4s ease-in-out infinite; }

        .dot-red    { animation: dotPulse 2.4s ease-in-out infinite; }
        .dot-yellow { animation: dotPulse 2.4s ease-in-out infinite 0.25s; }
        .dot-green  { animation: dotPulse 2.4s ease-in-out infinite 0.5s; }

        .title-glow { animation: glowPulse 3s ease-in-out infinite; transform-origin: center; }
        .title-cursor { animation: blink 1s steps(1) infinite; }

        .subtitle { opacity: 0; animation: fadeUp 0.6s ease forwards 1.1s; }

        .cmd-text { opacity: 0; animation: fadeUp 0.4s ease forwards 1.6s; }
        .cmd-cursor { animation: blink 0.9s steps(1) infinite; animation-delay: 2s; opacity: 0; }

        .item { opacity: 0; animation: fadeUp 0.45s ease forwards; }
        .i1 { animation-delay: 2.15s; }
        .i2 { animation-delay: 2.35s; }
        .i3 { animation-delay: 2.55s; }
        .i4 { animation-delay: 2.75s; }
        .i5 { animation-delay: 2.95s; }
        .i6 { animation-delay: 3.15s; }
      ]]>
    </style>

    <clipPath id="typeClip">
      <rect x="86" y="178" width="0" height="26">
        <animate attributeName="width" from="0" to="260" dur="0.9s" begin="1.6s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.2 1"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1200" height="320" fill="#0D1117"/>

  <!-- Terminal -->
  <rect x="60" y="40" width="1080" height="240" rx="12" fill="#161B22" stroke="#30363D" class="terminal-border"/>

  <!-- Header -->
  <rect x="60" y="40" width="1080" height="36" rx="12" fill="#21262D"/>
  <circle cx="85" cy="58" r="6" fill="#FF5F56" class="dot-red"/>
  <circle cx="105" cy="58" r="6" fill="#FFBD2E" class="dot-yellow"/>
  <circle cx="125" cy="58" r="6" fill="#27C93F" class="dot-green"/>
  <text x="550" y="63" fill="#8B949E" font-size="14" font-family="monospace" text-anchor="middle">terminal</text>

  <!-- Title -->
  <text x="90" y="120" fill="#58A6FF" font-size="38" font-family="monospace" font-weight="bold" class="title-glow">
    KEROSEEN<tspan class="title-cursor">_</tspan>
  </text>

  <text x="90" y="150" fill="#8B949E" font-size="17" font-family="monospace" class="subtitle">
    Building Open-Source OSINT &amp; Cybersecurity Tools
  </text>

  <!-- Command with typing effect -->
  <text x="90" y="195" fill="#3FB950" font-size="18" font-family="monospace" clip-path="url(#typeClip)">
    $ ls ~/projects
  </text>
  <rect x="230" y="180" width="10" height="20" fill="#3FB950" class="cmd-cursor"/>

  <!-- Projects -->
  <text x="110" y="225" fill="#F0F6FC" font-size="17" font-family="monospace" class="item i1">├── KeroScope</text>
  <text x="110" y="248" fill="#F0F6FC" font-size="17" font-family="monospace" class="item i2">├── KeroRecon</text>
  <text x="110" y="271" fill="#F0F6FC" font-size="17" font-family="monospace" class="item i3">├── KeroTrace</text>

  <text x="500" y="225" fill="#F0F6FC" font-size="17" font-family="monospace" class="item i4">├── KeroGraph</text>
  <text x="500" y="248" fill="#F0F6FC" font-size="17" font-family="monospace" class="item i5">├── KeroReport</text>
  <text x="500" y="271" fill="#F0F6FC" font-size="17" font-family="monospace" class="item i6">└── KeroHub</text>
</svg>
