<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

text{
    font-family:'JetBrains Mono', monospace;
}

.title{
    font-size:42px;
    font-weight:700;
    fill:#F0F6FC;
}

.subtitle{
    font-size:18px;
    fill:#8B949E;
}

.term{
    font-size:17px;
    fill:#58A6FF;
}

.output{
    font-size:16px;
    fill:#C9D1D9;
}

.ok{
    fill:#3FB950;
}

.cursor{
    animation:blink 1s infinite;
}

.line1{animation:show .5s forwards;}
.line2{opacity:0;animation:show .5s .6s forwards;}
.line3{opacity:0;animation:show .5s 1.2s forwards;}
.line4{opacity:0;animation:show .5s 1.8s forwards;}
.line5{opacity:0;animation:show .5s 2.4s forwards;}
.line6{opacity:0;animation:show .5s 3s forwards;}
.line7{opacity:0;animation:show .5s 3.6s forwards;}
.line8{opacity:0;animation:show .5s 4.2s forwards;}

@keyframes show{
    from{
        opacity:0;
        transform:translateY(4px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

.grid{
    stroke:#161B22;
    stroke-width:1;
}
</style>

<rect width="1200" height="280" fill="#0D1117"/>

<!-- background grid -->
<g opacity=".35">
<line class="grid" x1="0" y1="40" x2="1200" y2="40"/>
<line class="grid" x1="0" y1="80" x2="1200" y2="80"/>
<line class="grid" x1="0" y1="120" x2="1200" y2="120"/>
<line class="grid" x1="0" y1="160" x2="1200" y2="160"/>
<line class="grid" x1="0" y1="200" x2="1200" y2="200"/>
<line class="grid" x1="0" y1="240" x2="1200" y2="240"/>

<line class="grid" x1="200" y1="0" x2="200" y2="280"/>
<line class="grid" x1="400" y1="0" x2="400" y2="280"/>
<line class="grid" x1="600" y1="0" x2="600" y2="280"/>
<line class="grid" x1="800" y1="0" x2="800" y2="280"/>
<line class="grid" x1="1000" y1="0" x2="1000" y2="280"/>
</g>

<text x="60" y="65" class="title">
KEROSEEN<tspan class="cursor">_</tspan>
</text>

<text x="60" y="95" class="subtitle">
Building Open-Source OSINT &amp; Cybersecurity Tools
</text>

<text x="60" y="140" class="term line1">$ ls ~/projects</text>

<text x="60" y="170" class="output line2">
<tspan class="ok">✔</tspan> KeroScope
</text>

<text x="60" y="195" class="output line3">
<tspan class="ok">✔</tspan> KeroRecon
</text>

<text x="60" y="220" class="output line4">
<tspan class="ok">✔</tspan> KeroTrace
</text>

<text x="350" y="170" class="output line5">
<tspan class="ok">✔</tspan> KeroGraph
</text>

<text x="350" y="195" class="output line6">
<tspan class="ok">✔</tspan> KeroReport
</text>

<text x="350" y="220" class="output line7">
<tspan class="ok">✔</tspan> KeroHub
</text>

<text x="60" y="255" class="term line8">
$ <tspan class="cursor">█</tspan>
</text>

</svg>
